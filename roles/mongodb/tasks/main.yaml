- name: "Copy the mongodb repo file from files directory"
  ansible.builtin.copy:
    src: "mongodb.repo"
    dest: "/etc/yum.repos.d/mongodb.repo"

- name: "display message"
  ansible.builtin.debug:
    msg: "Successfully copied the mongodb.repo file to /etc/yum.repos.d/mongodb.repo"

- name: "Install mongodb-org package"
  ansible.builtin.dnf:
    name: "mongodb-org"
    state: present

- name: "display message"
  ansible.builtin.debug:
    msg: "Successfully installed mongodb-org package" 
  
- name: "Allowing the remote connections to mongodb"
  ansible.builtin.replace:
    path: "/etc/mongod.conf"
    regexp: '127.0.0.1'
    replace: '0.0.0.0'
  
- name: "display message"
  ansible.builtin.debug:
    msg: "Successfully allowed the remote connections to mongodb"

- name: "Start and enable mongod service"
  ansible.builtin.service:
    name: "mongod"
    enabled: true
    state: started
  
- name: "display message"
  ansible.builtin.debug:
    msg: "Successfully started and enabled mongod service"