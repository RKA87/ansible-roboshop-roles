- name: "Application setup for {{ component }}"
  ansible.builtin.import_role:
    name: "common"
    tasks_from: "app-setup.yaml"

- name: "Node JS setup for {{ component }}"
  ansible.builtin.import_role:
    name: "common"
    tasks_from: "nodejs-setup.yaml"

- name: "Systemd Setup for {{ component }}"
  ansible.builtin.import_role:
    name: "common"
    tasks_from: "systemd-setup.yaml"

- name: "start and enable {{ component}} service"
  ansible.builtin.service:
    name: "{{ component }}"
    state: restarted
    enabled: yes