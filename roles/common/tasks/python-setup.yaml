- name: "Install Python3 gcc and other dependencies"
  ansible.builtin.dnf:
    name: "{{ item }}"
    state: present
  with_items:
    - python3
    - python3-devel
    - gcc
  
- name: "Install Python3 pip"
  ansible.builtin.pip:
   requirements: requirements.txt
   executable: pip3.9
  args:
    chdir: /app