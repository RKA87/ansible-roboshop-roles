- name: "Disable Nodejs"
  ansible.builtin.command: "dnf module disable nodejs -y"

- name: "Enable the nodejs:20 module"
  ansible.builtin.command: "dnf module enable nodejs:20 -y"

- name: "Install nodejs"
  ansible.builtin.dnf:
    name: nodejs
    state: present

- name: "Install nodejs dependencies"
  community.general.npm:
    path: /app
    state: present